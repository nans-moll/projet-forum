<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinéForum - Inscription</title>
    <link rel="stylesheet" href="/views/layouts/auth/auth.css">
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>🎬 CinéForum</h1>
            <p>Rejoignez notre communauté</p>
        </div>
        
        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Nom d'utilisateur <span class="required">*</span></label>
                <input type="text" id="username" name="username" placeholder="Votre nom d'utilisateur" required>
            </div>
            
            <div class="form-group">
                <label for="email">Adresse email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe <span class="required">*</span></label>
                <input type="password" id="password" name="password" placeholder="Mot de passe sécurisé" required>
                <div class="password-requirements">
                    <small>Le mot de passe doit contenir :</small>
                    <ul>
                        <li>• Au moins 8 caractères</li>
                        <li>• Une lettre majuscule</li>
                        <li>• Une lettre minuscule</li>
                        <li>• Un chiffre</li>
                    </ul>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirmer le mot de passe <span class="required">*</span></label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirmez votre mot de passe" required>
            </div>
            
            <button type="submit" class="btn-register">
                📝 Créer mon compte
            </button>
        </form>
        
        <div class="login-link">
            <p>Déjà membre ? <a href="/login">Se connecter</a></p>
        </div>
    </div>
</body>
</html>
